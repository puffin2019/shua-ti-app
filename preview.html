let currentIndex = 0;
let correctCount = 0;
let answeredCount = 0;
function renderQuestion() {
  const q = questions[currentIndex];
  document.getElementById('question').innerText = q.question;
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  document.getElementById('result').innerText = '';
  document.getElementById('explanation').innerText = '';
  updateStats();
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(idx);
    optionsDiv.appendChild(btn);
  });
}
function checkAnswer(selected) {
  const q = questions[currentIndex];
  const resultDiv = document.getElementById('result');
  const explanationDiv = document.getElementById('explanation');
  answeredCount++;
  if (selected === q.answer) {
    resultDiv.innerText = '✅ 回答正确！';
    resultDiv.style.color = 'green';
  } else {
    resultDiv.innerText = `❌ 回答错误！正确答案：${q.options[q.answer]}`;
    resultDiv.style.color = 'red';
  }
  explanationDiv.innerText = q.explanation;
  if(!q.explanation) explanationDiv.innerText = '';
  if(selected === q.answer) correctCount++;
  updateStats();
}
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    alert('题目已完成！');
    currentIndex = 0;
    correctCount = 0;
    answeredCount = 0;
  }
  renderQuestion();
}
function updateStats() {
  const statsDiv = document.getElementById('stats');
  const rate = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
  statsDiv.innerText = `已做题数: ${answeredCount} / ${questions.length} | 正确题数: ${correctCount} | 正确率: ${rate}%`;
}
renderQuestion();
</script>
